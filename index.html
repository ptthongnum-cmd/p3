<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics AR Ghibli Adventure</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Itim', cursive; }
        
        /* 📊 จัดเลย์เอาต์ UI แนวนอนสไตล์เกมพรีเมียม ไม่ซ้อนกันแน่นอน */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-size: 28px;
            font-weight: bold;
            color: #1b4332;
            border: 3px solid #2d5a27;
            pointer-events: auto;
        }
        #target-box {
            color: #123224;
            background: rgba(255, 245, 204, 0.9);
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="ui-container">
        <div class="ui-box" id="score-box">คะแนนสะสม: 0</div>
        <div class="ui-box" id="target-box">🌿 ส่องกล้องจิ้มเสียง: -it 🌿</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        <a-camera position="0 0 0"></a-camera>
    </a-scene>

<script>
let score = 0;
let currentTarget = 'it';
const wordsIT = ['sit', 'hit', 'fit', 'bit', 'pit'];
const wordsIG = ['pig', 'dig', 'big', 'wig', 'fig'];

const sceneEl = document.querySelector('a-scene');
const scoreBox = document.getElementById('score-box');
const targetBox = document.getElementById('target-box');

// ฟังก์ชันสุ่มเสียงโจทย์รอบใหม่
function changeTargetSound() {
    currentTarget = Math.random() > 0.5 ? 'it' : 'ig';
    targetBox.innerHTML = `🌿 ส่องกล้องจิ้มเสียง: -${currentTarget} 🌿`;
}

// 🍄 ระบบสุ่มเสกเห็ด 3D ลอยขึ้นมาในโลกจริง ทุกๆ 2 วินาที
setInterval(() => {
    const type = Math.random() > 0.5 ? 'it' : 'ig';
    const word = type === 'it' ? wordsIT[Math.floor(Math.random() * wordsIT.length)] : wordsIG[Math.floor(Math.random() * wordsIG.length)];
    const color = type === 'it' ? '#fc5c65' : '#2bcbba'; // แดงมะเขือเทศ หรือ เขียวพาสเทล Ghibli

    // สร้างกล่องข้อความคำศัพท์เวทมนตร์ลอยได้
    const entity = document.createElement('a-entity');
    
    // สุ่มพิกัดให้เห็ดลอยอยู่ตรงหน้ากล้อง (ซ้าย ขวา บน ล่าง)
    const posX = (Math.random() - 0.5) * 7; 
    const posY = (Math.random() - 0.5) * 4 + 1; 
    const posZ = -5; // ลอยอยู่ห่างจากหน้ากล้อง 5 เมตรกำลังดี เด็กๆ จิ้มง่าย
    
    entity.setAttribute('position', `${posX} ${posY} ${posZ}`);
    entity.setAttribute('class', 'clickable');

    // 3D ส่วนหัวเห็ด/ผลไม้กลมมนละมุน
    const mushroomCap = document.createElement('a-sphere');
    mushroomCap.setAttribute('radius', '0.4');
    mushroomCap.setAttribute('color', color);
    mushroomCap.setAttribute('scale', '1 0.7 1');
    entity.appendChild(mushroomCap);

    // 3D ส่วนก้านเห็ดนุ่มๆ
    const mushroomStem = document.createElement('a-cylinder');
    mushroomStem.setAttribute('radius', '0.1');
    mushroomStem.setAttribute('height', '0.4');
    mushroomStem.setAttribute('color', '#fff5db');
    mushroomStem.setAttribute('position', '0 -0.3 0');
    entity.appendChild(mushroomStem);

    // 📝 ป
